server {
    listen 80;
    server_name custom-integration-hub.velocy.co;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name custom-integration-hub.velocy.co;

    # SSL managed by certbot
    ssl_certificate /etc/letsencrypt/live/custom-integration-hub.velocy.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/custom-integration-hub.velocy.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 2m;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}
